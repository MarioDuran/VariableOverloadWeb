                    if (directDir.length() > 0) directDir.normalize();

                    const hasLOS = hasLineOfSightToPlayer(e, distToPlayer);
                    const pathDir = getPathfindingDirection(e);
                    const moved = moveEnemyWithSteering(e, directDir, pathDir, delta, hasLOS);

                    if (!moved) {
                        nudgeEnemyAwayFromWalls(e);
                    }
                    
                    const attackRange = e.isFinalBoss ? 3.0 : (e.isBoss ? 6.0 : 3.6);
                    
                    if (distToPlayer < attackRange && e.attackCooldown <= 0 && isGameRunning) {
                        const damage = e.isFinalBoss ? 24 : (e.isBoss ? 16 : 10 + missionIndex * 2);
                        health -= damage;
                        playPlayerDamageSound();
                        e.attackCooldown = e.isFinalBoss ? 2.0 : (e.isBoss ? 1.2 : 0.8);

                        if (health <= 0) {
                            respawnAtCheckpoint();
                        } else {
                            updateHUD('¡SISTEMA DAÑADO!');
                        }

                        e.mesh.position.addScaledVector(directDir, -4.5);
                        e.box.setFromObject(e.mesh);
                    }
                }
            }

            function maybeWarnEnemyBehind(enemy, distToPlayer, time) {
                if (!isGameRunning || isGameOver || distToPlayer > 11 || distToPlayer < 3.8) return;
                if (time - lastBehindWarningTime < 9.0) return;

                const forward = new THREE.Vector3();
                camera.getWorldDirection(forward);
                forward.y = 0;
                if (forward.lengthSq() < 0.01) return;
                forward.normalize();

                const toEnemy = new THREE.Vector3().subVectors(enemy.mesh.position, playerDolly.position);
                toEnemy.y = 0;
                if (toEnemy.lengthSq() < 0.01) return;
                toEnemy.normalize();

                if (forward.dot(toEnemy) < -0.58) {
                    lastBehindWarningTime = time;
                    notifyTecGPT('¡Boss, detrás de ti!');
                }
            }

            function hasLineOfSightToPlayer(enemy, distToPlayer) {
                if (distToPlayer > 42) return false;
                const from = enemy.mesh.position.clone();
                const to = playerDolly.position.clone();
                to.y = from.y;
                const direction = to.sub(from).normalize();
                const ray = new THREE.Raycaster(from, direction, 0, distToPlayer);
                return ray.intersectObjects(wallMeshes).length === 0;
            }

            function getPathfindingDirection(enemy) {
                const ex = Math.floor(enemy.mesh.position.x / TILE_SIZE);
                const ez = Math.floor(enemy.mesh.position.z / TILE_SIZE);
                let bestDist = (flowField[ez] && flowField[ez][ex] !== undefined) ? flowField[ez][ex] : 9999;
                let bestX = ex;
                let bestZ = ez;
                const dirs = [{ x: 0, z: -1 }, { x: 0, z: 1 }, { x: -1, z: 0 }, { x: 1, z: 0 }, { x: -1, z: -1 }, { x: 1, z: -1 }, { x: -1, z: 1 }, { x: 1, z: 1 }];

                for (const d of dirs) {
                    const nx = ex + d.x;
                    const nz = ez + d.z;
                    if (!isWalkableCell(nx, nz)) continue;
                    if (d.x !== 0 && d.z !== 0 && (!isWalkableCell(ex + d.x, ez) || !isWalkableCell(ex, ez + d.z))) continue;
                    if (flowField[nz][nx] < bestDist) {
                        bestDist = flowField[nz][nx];
                        bestX = nx;
                        bestZ = nz;
                    }
                }

                const targetPos = new THREE.Vector3(bestX * TILE_SIZE, enemy.mesh.position.y, bestZ * TILE_SIZE);
                const dir = targetPos.sub(enemy.mesh.position);
                dir.y = 0;
                if (dir.length() > 0.05) dir.normalize();
                return dir;
            }

            function moveEnemyWithSteering(enemy, directDir, pathDir, delta, hasLOS) {
                const candidates = [];
                const direct = directDir && directDir.lengthSq() > 0 ? directDir.clone().normalize() : null;
                const path = pathDir && pathDir.lengthSq() > 0 ? pathDir.clone().normalize() : null;

                if (hasLOS && direct) candidates.push(direct);
                if (hasLOS && direct && path) candidates.push(direct.clone().multiplyScalar(0.72).add(path.clone().multiplyScalar(0.28)).normalize());
                if (path) candidates.push(path);
                if (direct) {
                    const sideA = new THREE.Vector3(-direct.z, 0, direct.x).normalize();
                    const sideB = new THREE.Vector3(direct.z, 0, -direct.x).normalize();
                    candidates.push(direct.clone().multiplyScalar(0.65).add(sideA.multiplyScalar(0.35)).normalize());
                    candidates.push(direct.clone().multiplyScalar(0.65).add(sideB.multiplyScalar(0.35)).normalize());
                }
                if (path) {
                    candidates.push(new THREE.Vector3(-path.z, 0, path.x).normalize());
                    candidates.push(new THREE.Vector3(path.z, 0, -path.x).normalize());
                }

                const before = enemy.mesh.position.clone();
                const beforeDist = before.distanceTo(playerDolly.position);
                for (const candidate of candidates) {
                    if (!candidate || candidate.lengthSq() === 0) continue;
                    enemy.mesh.position.copy(before);
                    enemy.box.setFromObject(enemy.mesh);
                    if (moveEnemyWithCollision(enemy, candidate, delta)) {
                        const afterDist = enemy.mesh.position.distanceTo(playerDolly.position);
                        if (afterDist <= beforeDist + 0.35) return true;
                    }
                }

                enemy.mesh.position.copy(before);
                enemy.box.setFromObject(enemy.mesh);
                return false;
            }

            function moveEnemyWithCollision(enemy, dir, delta) {
                if (!dir || dir.lengthSq() === 0) return false;
                const fullStep = enemy.speed * delta;
                const subSteps = Math.max(1, Math.ceil(fullStep / 0.75));
                const step = fullStep / subSteps;
                let moved = false;

                for (let n = 0; n < subSteps; n++) {
                    const before = enemy.mesh.position.clone();

                    enemy.mesh.position.x += dir.x * step;
                    enemy.box.setFromObject(enemy.mesh);
                    if (enemyHitsWorldCollision(enemy)) enemy.mesh.position.x = before.x;

                    enemy.mesh.position.z += dir.z * step;
                    enemy.box.setFromObject(enemy.mesh);
                    if (enemyHitsWorldCollision(enemy)) enemy.mesh.position.z = before.z;

                    enemy.box.setFromObject(enemy.mesh);
                    moved = moved || enemy.mesh.position.distanceToSquared(before) > 0.0004;
                }

                return moved;
            }

            function getEnemyCollisionBox(enemy) {
                const size = enemy.isFinalBoss ? 5.4 : (enemy.isBoss ? 4.7 : 1.9);
                const height = enemy.isFinalBoss ? 6.8 : (enemy.isBoss ? 5.2 : 2.2);
                return new THREE.Box3().setFromCenterAndSize(
                    new THREE.Vector3(enemy.mesh.position.x, enemy.isFinalBoss ? 3.4 : (enemy.isBoss ? 2.6 : 1.25), enemy.mesh.position.z),
                    new THREE.Vector3(size, height, size)
                );
            }

            function enemyHitsWorldCollision(enemy) {
                const box = getEnemyCollisionBox(enemy);
                if (walls.some(w => box.intersectsBox(w.box))) return true;
                if (doors.some(d => d.locked && box.intersectsBox(d.box))) return true;
                return false;
            }

            function nudgeEnemyAwayFromWalls(enemy) {
                const ex = Math.round(enemy.mesh.position.x / TILE_SIZE);
                const ez = Math.round(enemy.mesh.position.z / TILE_SIZE);
                const center = new THREE.Vector3(ex * TILE_SIZE, enemy.mesh.position.y, ez * TILE_SIZE);
                const toCenter = center.sub(enemy.mesh.position);
                toCenter.y = 0;
                if (toCenter.lengthSq() > 0.01) {
                    toCenter.normalize();
                    moveEnemyWithCollision(enemy, toCenter, 0.16);
                }

                const direct = new THREE.Vector3().subVectors(playerDolly.position, enemy.mesh.position);
                direct.y = 0;
                if (direct.lengthSq() > 0.01) {
                    direct.normalize();
                    const side = Math.random() < 0.5
                        ? new THREE.Vector3(-direct.z, 0, direct.x)
                        : new THREE.Vector3(direct.z, 0, -direct.x);
                    moveEnemyWithCollision(enemy, side.normalize(), 0.08);
                }
            }

            // --- MOVIMIENTO / PUERTAS ---
            function updatePlayerMovement(delta) {
                const session = renderer.xr.getSession();
                if (!session) return;

                if (weaponSwitchCooldown > 0) weaponSwitchCooldown -= delta;
                if (doorWarningCooldown > 0) doorWarningCooldown -= delta;

                for (const source of session.inputSources) {
                    if (!source.gamepad) continue;

                    let axX = 0;
                    let axY = 0;
                    if (source.gamepad.axes.length >= 4) {
                        axX = source.gamepad.axes[2];
                        axY = source.gamepad.axes[3];
                    } else if (source.gamepad.axes.length >= 2) {
                        axX = source.gamepad.axes[0];
                        axY = source.gamepad.axes[1];
                    }
                    if (Math.abs(axX) < 0.2) axX = 0;
                    if (Math.abs(axY) < 0.2) axY = 0;

                    if (source.handedness === 'left') {
                        let isSprinting = false;
                        if (source.gamepad.buttons[1] && source.gamepad.buttons[1].pressed && stamina > 0) {
                            isSprinting = true;
                            stamina = Math.max(0, stamina - 24 * delta);
                        } else {
                            stamina = Math.min(MAX_STAMINA, stamina + 32 * delta);
                        }

                        if (axX !== 0 || axY !== 0) {
                            const moveSpeed = (isSprinting && stamina > 0 ? 11 : 6) * delta;
                            const fwDir = new THREE.Vector3();
                            camera.getWorldDirection(fwDir);
                            fwDir.y = 0;
                            fwDir.normalize();
                            const rtDir = new THREE.Vector3().copy(fwDir).cross(camera.up).normalize();

                            const moveVec = new THREE.Vector3();
                            moveVec.addScaledVector(fwDir, -axY * moveSpeed);
                            moveVec.addScaledVector(rtDir, axX * moveSpeed);

                            const px = playerDolly.position.x + moveVec.x;
                            const pz = playerDolly.position.z + moveVec.z;
                            const pBox = new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(px, 1, pz), new THREE.Vector3(2, 2, 2));
                            if (!hitsWorldCollision(pBox)) {
                                playerDolly.position.x = px;
                                playerDolly.position.z = pz;
                            }
                        }
                    }

                    if (source.handedness === 'right') {
                        const stickSwitchActive = Math.abs(axX) > 0.65;
                        if (stickSwitchActive && !rightStickWeaponAxisWasActive && weaponSwitchCooldown <= 0) {
                            switchWeapon(axX > 0 ? 1 : -1);
                            weaponSwitchCooldown = 0.28;
                        }
                        rightStickWeaponAxisWasActive = stickSwitchActive;
                    }
                }
            }

            function hitsWorldCollision(box) {
                if (walls.some(w => box.intersectsBox(w.box))) return true;
                if (doors.some(d => d.locked && box.intersectsBox(d.box))) return true;
                return false;
            }

            function updateDoorTransitions() {
                if (isDirectoryTransitioning) return;
                for (const d of doors) {
                    const dist = playerDolly.position.distanceTo(d.mesh.position);
                    if (dist < TILE_SIZE / 1.55) {
                        if (d.locked) {
                            if (doorWarningCooldown <= 0) {
                                if (d.routeLocked) notifyTecGPT('Ruta no autorizada todavía. Sigue la ruta sugerida para eliminar el virus.');
                                else notifyTecGPT('Puerta bloqueada. Limpia la oleada de esta habitación para desbloquear el directorio.');
                                updateHUD(d.routeLocked ? 'RUTA BLOQUEADA' : 'OLEADA ACTIVA');
                                doorWarningCooldown = 4.0;
                            }
                        } else {
                            playDoorOpenSound();
                            beginDirectoryTransition(d.targetPath);
                            break;
                        }
                    }
                }
            }

            // --- AUDIO ---
            function playSoundResource(fileName, volume = 1.0) {
                if (!soundCache.has(fileName)) {
                    const base = new Audio(fileName);
                    base.preload = 'auto';
                    base.load();
                    soundCache.set(fileName, base);
                }
                const audio = soundCache.get(fileName).cloneNode(true);
                audio.volume = volume;
                audio.play().catch(() => {});
            }

            function playShootSound() {
                playSoundResource('shot.mp3', 0.9);
            }

            function playEnemyKillSound() {
                playSoundResource('enemy_kill.mp3', 0.95);
            }

            function playCureSound() {
                playSoundResource('cure.mp3', 0.95);
            }

            function playPowerupSound() {
                playSoundResource('powerup.mp3', 0.95);
            }

            function playErrorSound() {
                playSoundResource('error.mp3', 0.75);
            }

            function playPlayerDamageSound() {
                playSoundResource('damage.mp3', 0.95);
            }

            function playDoorOpenSound() {
                playSoundResource('door_open.mp3', 0.95);
            }

            function cleanupActiveRoomEntities() {
                enemies.forEach(e => scene.remove(e.mesh));
                dyingEnemies.forEach(e => scene.remove(e.mesh));
                lasers.forEach(l => scene.remove(l.mesh));
                pickups.forEach(p => scene.remove(p.mesh));
                enemies = [];
                dyingEnemies = [];
                lasers = [];
                pickups = [];
                activeWave = null;
                pendingWaveAfterUpgrade = false;
            }

            function respawnAtCheckpoint() {
                if (isDirectoryTransitioning) return;
                isDirectoryTransitioning = true;
                isGameRunning = false;
                playerDeathVoiceQueued = true;
                playPlayerDamageSound();
                notifyTecGPT('¡Boss, ¿estás bien? No me aparece tu ubicación, Boss ¡por favor, responde!');
                showLoadingScreen('/');

                const savedWeapon = checkpointWeaponType || unlockedWeapons[unlockedWeapons.length - 1] || 'int';
                setTimeout(() => {
                    cleanupActiveRoomEntities();
                    health = 100;
                    stamina = MAX_STAMINA;
                    clipAmmo = Math.min(MAX_AMMO, Math.max(clipAmmo, 120));
                    loadDirectory('/');
                    const savedIndex = unlockedWeapons.indexOf(savedWeapon);
                    currentWeaponIndex = savedIndex >= 0 ? savedIndex : Math.max(0, unlockedWeapons.length - 1);
                    updateWeaponMaterial();
                    hideLoadingScreen();
                    isDirectoryTransitioning = false;
                    isGameRunning = true;
                    playerDeathVoiceQueued = false;
                    lastBehindWarningTime = clock.getElapsedTime();
                    updateHUD('CHECKPOINT RESTAURADO');
                }, 900);
            }

            // --- PANTALLAS FINALES ---
            function showEndScreen(title, subtitle, color) {
                isGameOver = true;
                isGameRunning = false;
                activeWave = null;

                const canvas = document.createElement('canvas');
                canvas.width = 1024;
                canvas.height = 1024;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = color === '#00ffaa' ? 'rgba(0, 30, 20, 0.95)' : 'rgba(40, 0, 0, 0.95)';
                ctx.fillRect(0, 0, 1024, 1024);
                ctx.strokeStyle = color;
                ctx.lineWidth = 15;
                ctx.strokeRect(0, 0, 1024, 1024);
                ctx.textAlign = 'center';
                ctx.fillStyle = color;
                ctx.font = 'bold 104px Courier New';
                ctx.fillText(title, 512, 280);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 62px Courier New';
                ctx.fillText(subtitle, 512, 485);
                ctx.fillStyle = '#0f0';
                ctx.font = 'bold 54px Courier New';
                ctx.fillText('[ DISPARA AQUÍ ]', 512, 740);
                ctx.fillText('PARA REINICIAR', 512, 830);

                const tex = new THREE.CanvasTexture(canvas);
                const geo = new THREE.PlaneGeometry(1.5, 1.5);
                const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthTest: false });
                gameOverMesh = new THREE.Mesh(geo, mat);
                gameOverMesh.renderOrder = 1002;
                gameOverMesh.position.set(0, 0, -1.5);
                camera.add(gameOverMesh);
            }

            function finishGame() {
                notifyTecGPT('El virus ha sido eliminado. Variable Overload ha sido purgado del servidor. Buen trabajo, Boss.');
                showEndScreen('SERVER CLEAN', `SCORE FINAL: ${score}`, '#00ffaa');
            }

            // --- LOOP ---
            function animate() {
                const delta = clock.getDelta();
                const time = clock.getElapsedTime();

                updateNotification();

                if (isDirectoryTransitioning) {
                    renderer.render(scene, camera);
                    return;
                }

                if (!isGameRunning) {
                    renderer.render(scene, camera);
                    return;
                }

                updatePlayerMovement(delta);

                if (rightController && rightController.userData.isSelecting) fireWeapon(rightController, rightWeaponMesh);
                if (leftController && leftController.userData.isSelecting) fireWeapon(leftController, leftWeaponMesh);

                updateDoorTransitions();
                updateWaveSpawning();
                updateLasers(delta);
                updateDyingEnemies(delta);
                updatePickups(delta);

                if (time - lastFlowFieldUpdate > 0.28) {
                    const px = Math.floor(playerDolly.position.x / TILE_SIZE);
                    const pz = Math.floor(playerDolly.position.z / TILE_SIZE);
                    updateFlowField(px, pz);
                    lastFlowFieldUpdate = time;
                }

                updateEnemies(delta, time);

                if (time - lastHudUpdate > 0.12) {
                    updateHUD();
                    lastHudUpdate = time;
                }

                renderer.render(scene, camera);
            }

            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        } catch (error) {
            document.getElementById('error-log').innerText = '❌ Falla de ejecución: ' + error.message;
            console.error(error);
        }
    </script>
</body>
